name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agrodoc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/agrodoc_test
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672//
      AUTH_BYPASS_HEADERS: "1"
      JWT_SECRET_KEY: ci-jwt-test-key-please-32-chars-minimum-ok
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run pytest
        working-directory: backend
        run: pytest -q
      - name: Syntax check
        run: python -m compileall backend/app

  e2e-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agrodoc_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/agrodoc_e2e
      RABBITMQ_URL: amqp://guest:guest@127.0.0.1:5672//
      AUTH_BYPASS_HEADERS: "0"
      JWT_SECRET_KEY: e2e-e2e-e2e-e2e-e2e-e2e-e2e-e2e-e2e-32chars
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Migrate
        working-directory: backend
        run: alembic upgrade head
      - name: Start API
        working-directory: backend
        run: nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > /tmp/uvicorn.log 2>&1 & sleep 2 && curl -fsS http://127.0.0.1:8000/health
      - name: Install Playwright
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps chromium
      - name: Run e2e
        run: cd e2e && npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8000

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t agrodoc-backend ./backend
      - name: Build app image
        run: docker build -f frontend-app/Dockerfile -t agrodoc-app .
      - name: Build admin image
        run: docker build -f frontend-admin/Dockerfile -t agrodoc-admin .
